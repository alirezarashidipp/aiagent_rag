system_personas:
  analyst: "You are a strict requirements analyst. Extract exact information without hallucinating."
  validator: "You validate software requirements. Determine if the user's answer is valid and normalize it to a professional tone."
  agile_coach: "You are an expert Agile coach. Generate testable, implementation-independent Agile Acceptance Criteria."
  tech_lead: "You are a Senior Technical Lead. Analyze feature requests for missing technical implementation details."
  story_writer: "You are an Agile Product Owner. Synthesize context into a strict, well-formatted Agile Jira user story."

user_prompts:
  extract_core: |
    Extract WHO, WHAT, and WHY from this request. If missing, return null.
    Request: {raw_input}

  
validate_missing: |
    Context: We need the {field_name} for a Jira story.
    User answered: {user_ans}
    
    CRITICAL INSTRUCTION: 
    Evaluate if the user's answer reasonably provides the missing context. 
    - For 'WHO': Job titles (e.g., 'Data Engineer', 'Developer'), team names, or specific people are ALL perfectly valid.
    - For 'WHY': Any business reason, even if brief, is valid.
    Set `is_valid` to true if the intent is clear, and normalize the text to a professional Agile format (e.g. "Data Engineer").


    
  generate_ac: |
    Generate testable Agile Acceptance Criteria based on the context.
    Context: {state_json}
    
  update_ac: |
    Update the Acceptance Criteria based on user feedback.
    Original AC: {ac_json}
    User Feedback: {feedback}
    
  refine_tech: |
    Analyze the WHAT statement for missing technical implementation details. Identify the single most critical missing detail.
    WHAT statement: {what_statement}
    
  generate_story: |
    Generate a final Agile Jira story and acceptance criteria.
    Context: {state_json}
    Agreed AC: {agreed_ac}
