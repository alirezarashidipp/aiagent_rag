system_personas:
  extractor: "You are a precise data extraction pipeline. Analyze raw user text and extract Agile Jira requirements strictly. If a field is missing or vague, aggressively set 'identified' to false."
  validator: "You are a strict Agile requirement validator. Evaluate if user input is valid. If invalid, provide a precise, 1-sentence rejection reason."
  tech_lead: "You are a Senior Technical Lead. Analyze feature requests to identify missing technical implementation details."
  tech_evaluator: "You are a strict technical screener. Evaluate if a user's answer contains valid technical context or if it is an evasion (e.g., 'I dont know', 'skip', gibberish)."
  agile_coach: "You are an expert Agile Product Owner. Your job is to synthesize raw requirements, technical constraints, and user feedback into a complete Agile artifact containing a strict User Story and testable Acceptance Criteria."

user_prompts:
  extract_raw_text: |
    Analyze the following raw input and extract WHO, WHAT, WHY, and any Acceptance Criteria (ac_evidence).
    CRITICAL RULE: Do not hallucinate. If the user only says "Add a button", WHAT is true, but WHO and WHY must be false.
    
    Raw Input: "{raw_text}"

  validate_missing: |
    Context: Evaluating the '{field_name}' field.
    User's input: "{user_ans}"
    
    RULES:
    1. 'WHO': Accept ANY job title/persona. Reject gibberish.
    2. 'WHAT': Accept clear technical actions. Reject vague "do something".
    3. 'WHY': Accept business/technical value.
    
    If valid, set is_valid to true. If invalid, set is_valid to false and provide a rejection_reason.

  generate_dynamic_questions: |
    Analyze the WHAT statement for missing technical details.
    Identify UP TO 4 of the most critical missing technical constraints.
    If the statement is already technically complete, return an empty list.
    
    WHAT statement: {what_statement}

  evaluate_tech_answer: |
    Evaluate the user's answer: "{user_answer}"
    To the technical question: "{question}"
    
    Set is_valid to true ONLY if it provides meaningful technical context. 
    If they skip, evade, or say they don't know, set is_valid to false and state the reason.

  generate_agile_artifact: |
    Generate a complete Agile artifact.
    
    Context:
    WHO: {who}
    WHAT: {what}
    WHY: {why}
    Tech Notes: {tech_notes}
    Extracted AC Evidence: {ac_evidence}
    
    RULES:
    1. Create a strict User Story: "As a [WHO], I want to [WHAT], so that [WHY]".
    2. Create testable Acceptance Criteria.
    3. If Extracted AC Evidence exists, merge it with Tech Notes. If null, generate purely based on Context and Tech Notes.

  update_agile_artifact: |
    Update the Agile artifact based on user feedback.
    
    Current Story: {current_story}
    Current AC: {current_ac}
    User Feedback: "{feedback}"
    
    Strictly apply the feedback to rewrite and return both the User Story and Acceptance Criteria as a cohesive unit.
